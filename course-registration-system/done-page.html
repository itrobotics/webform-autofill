<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報名系統-填寫完成</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        img{
            width: 100%;
        }
        .wrapper{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: auto;
            width: 900px;
            background-image: url(./images/done-form-bg.jpg);
            background-repeat: no-repeat;
            background-size: 100%;
        }
        .wrapper .banner{
            max-width: 450px;
            width: 90%;
            margin: 50px auto 0;
        }
        .wrapper .title{
            display: flex;
            justify-content: center;
            align-items: center;
            color: 	#ad3400;
            width: 900px;
            font-weight: bold;
            font-size: 28px;
            letter-spacing: 2px;
            text-align: center;
        }
        .wrapper .addline{
            max-width: 700px;
            width: 90%;
            margin: 100px auto 0;
            cursor: pointer;
            transition: 0.4s;
        }
        .wrapper .addline:hover{
            transform: scale(1.05);
            transition: 0.4s;
        }
        @media screen and (max-width: 450px){
            .wrapper{
                width: 100%;
                height: 100%;
            }
            .wrapper .title{
                width: 100%;
                font-size: 18px;
            }
        }
    </style>

</head>
<body>
    <div class="wrapper">
        <div class="banner"><img src="images/done-img.png" alt="感謝填寫"></div>
        <div class="title"><h1>感謝您的填寫，資料已成功送出！</h1></div>
        <div class="addline"><a href="https://page.line.me/894cccbu?openQrModal=true" target="_blank"><img src="images/add-line.png" alt="點擊加LINE"></a></div>
    </div>
</body>
</html>
