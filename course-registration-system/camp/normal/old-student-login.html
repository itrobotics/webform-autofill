<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舊生快速帶入 - 艾思教育</title>
    <link href="../../images/favicon.png" rel="icon">
    <link rel="stylesheet" href="../../css/bootstrap.css">
    <link rel="stylesheet" href="https://www.beyond-coding.org.tw/children-camp/css/var.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f7f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .btn-primary {
            width: 100%;
            padding: 10px;
            font-size: 16px;
        }
        .error-msg {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .skip-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
        }
        .skip-link:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>舊生資料帶入</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="student_id">學生編號 (Student ID)</label>
                <input type="text" id="student_id" placeholder="請輸入學生編號 (如: STU12345)" required>
            </div>
            <div class="form-group">
                <label for="birthday">生日末四碼 (MMDD)</label>
                <input type="text" id="birthday" inputmode="numeric" maxlength="4" pattern="\d{4}" placeholder="例：12月22日請輸入 1222" required>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">查詢並帶入資料</button>
            <div class="error-msg" id="errorMsg"></div>
            <a href="camp-form.html" class="skip-link">我是新生 / 直接填寫報名表</a>
        </form>
    </div>
    <script src="old-student-login.js"></script>
</body>
</html>
